version: '3.8'

services:
  # 0. CLEANUP SERVICE (runs once before other services)
  # Multi-strategy identification to find containers regardless of Dokploy naming.
  # Uses: 1) Docker labels, 2) Name patterns, 3) Image matching
  # NEVER touches volumes - database data is always preserved.
  cleanup:
    image: docker:cli
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== Pre-deploy cleanup (containers only, volumes NEVER touched) ==="
        echo "Started at: $$(date)"

        # Collect all container IDs to remove
        CONTAINERS=""

        # Strategy 1: Find by label (most reliable for future deployments)
        echo "[1/3] Searching by label: app.project=steak-kenangan"
        LABELED=$$(docker ps -a -q --filter "label=app.project=steak-kenangan" 2>/dev/null || true)
        [ -n "$$LABELED" ] && CONTAINERS="$$CONTAINERS $$LABELED"

        # Strategy 2: Find by name patterns (handles Dokploy suffixes)
        echo "[2/3] Searching by name patterns: *steak*, *kenangan*"
        for pattern in "steak" "kenangan"; do
          MATCHED=$$(docker ps -a -q --filter "name=$$pattern" 2>/dev/null || true)
          [ -n "$$MATCHED" ] && CONTAINERS="$$CONTAINERS $$MATCHED"
        done

        # Strategy 3: Find by specific images (fallback)
        echo "[3/3] Searching by image (postgres, cloudflared with steak name)"
        for img in "postgres:15-alpine" "cloudflare/cloudflared"; do
          IMG_CONTAINERS=$$(docker ps -a -q --filter "ancestor=$$img" 2>/dev/null || true)
          for cid in $$IMG_CONTAINERS; do
            cname=$$(docker inspect --format '{{.Name}}' $$cid 2>/dev/null | sed 's/^\///' || echo "")
            if echo "$$cname" | grep -qiE "(steak|kenangan)"; then
              CONTAINERS="$$CONTAINERS $$cid"
            fi
          done
        done

        # Deduplicate container IDs
        UNIQUE=$$(echo "$$CONTAINERS" | tr ' ' '\n' | sort -u | grep -v '^$$' | tr '\n' ' ')

        # Get our own container ID to exclude
        SELF_CID=$$(cat /proc/1/cpuset 2>/dev/null | grep -oE '[0-9a-f]{12,64}' | head -1 || hostname)

        # Remove containers
        REMOVED=0
        SKIPPED=0
        for cid in $$UNIQUE; do
          [ -z "$$cid" ] && continue

          # Skip if it's us (cleanup container)
          if echo "$$cid" | grep -q "$$SELF_CID" || echo "$$SELF_CID" | grep -q "$$cid"; then
            echo "  [SKIP] Self (cleanup container)"
            SKIPPED=$$((SKIPPED+1))
            continue
          fi

          cname=$$(docker inspect --format '{{.Name}}' $$cid 2>/dev/null | sed 's/^\///' || echo "$$cid")
          echo "  [REMOVE] $$cname"
          docker stop "$$cid" --time 5 2>/dev/null || true
          docker rm -f "$$cid" 2>/dev/null || true
          REMOVED=$$((REMOVED+1))
        done

        echo ""
        echo "=== Cleanup Complete ==="
        echo "  Removed: $$REMOVED container(s)"
        echo "  Skipped: $$SKIPPED (self)"
        echo "  Volumes: PRESERVED (postgres_data untouched)"
        echo "========================"
    networks:
      - steak-network

  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=database"
      - "app.role=db"
    depends_on:
      cleanup:
        condition: service_completed_successfully
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      steak-network:
        aliases:
          - db

  # 2. BACKEND SERVICE (Go/Gin)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=backend"
      - "app.role=api"
    depends_on:
      cleanup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
    networks:
      steak-network:
        aliases:
          - backend

  # 3. FRONTEND SERVICE (Nginx + Vite Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=frontend"
      - "app.role=web"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./docker/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      steak-network:
        aliases:
          - frontend

  # 4. CLOUDFLARE TUNNEL SERVICE
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=tunnel"
      - "app.role=network"
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
    networks:
      - steak-network

networks:
  steak-network:
    driver: bridge
    labels:
      - "app.project=steak-kenangan"

volumes:
  postgres_data:
    labels:
      - "app.project=steak-kenangan"
      - "app.data=persistent"
