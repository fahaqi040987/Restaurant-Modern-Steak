version: '3.8'

services:
  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=database"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - steak-network

  # 2. DATABASE MIGRATION SERVICE
  db-migrate:
    image: postgres:15-alpine
    labels:
      - "app.project=steak-kenangan"
      - "app.service=migration"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGUSER=${DB_USER}
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=${DB_NAME}
      - PGHOST=db
      - PGPORT=${DB_PORT}
    volumes:
      - ./database/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Running database migrations ==="
        # Create migration tracking table if it doesn't exist
        psql -c "CREATE TABLE IF NOT EXISTS schema_migrations (
          filename TEXT PRIMARY KEY,
          applied_at TIMESTAMPTZ DEFAULT NOW()
        );"
        # Run each migration file in order, skip if already applied
        for f in /migrations/*.sql; do
          fname=$$(basename "$$f")
          already_applied=$$(psql -t -c "SELECT COUNT(*) FROM schema_migrations WHERE filename = '$$fname';" | tr -d ' ')
          if [ "$$already_applied" = "0" ]; then
            echo "Applying migration: $$fname"
            if psql -f "$$f"; then
              psql -c "INSERT INTO schema_migrations (filename) VALUES ('$$fname');"
              echo "  -> OK"
            else
              echo "  -> FAILED! Stopping migrations."
              exit 1
            fi
          else
            echo "Skipping (already applied): $$fname"
          fi
        done
        echo "=== All migrations applied successfully ==="
    networks:
      - steak-network

  # 3. BACKEND SERVICE
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=backend"
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    volumes:
      - steak_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - steak-network

  # 3. FRONTEND SERVICE (Disempurnakan)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # TAMBAHAN KRUSIAL: Memasukkan variabel VITE saat proses Build
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=frontend"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - steak_uploads:/usr/share/nginx/html/uploads
    networks:
      steak-network:
        aliases:
          - frontend.local

  # 4. CLOUDFLARE TUNNEL SERVICE
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=tunnel"
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - steak-network

networks:
  steak-network:
    driver: bridge

volumes:
  postgres_data:
    name: restaurant-modern-steak_postgres_data
  steak_uploads:
    name: restaurant-modern-steak_uploads
