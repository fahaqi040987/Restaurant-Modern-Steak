version: '3.8'

services:
  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=database"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - steak-network

  # 2. BACKEND SERVICE
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=backend"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
    networks:
      - steak-network

  # 3. FRONTEND SERVICE (Disempurnakan)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # TAMBAHAN KRUSIAL: Memasukkan variabel VITE saat proses Build
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=frontend"
    depends_on:
      - backend
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads
    networks:
      steak-network:
        aliases:
          - frontend.local

  # 4. CLOUDFLARE TUNNEL SERVICE
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    labels:
      - "app.project=steak-kenangan"
      - "app.service=tunnel"
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
    networks:
      - steak-network

networks:
  steak-network:
    driver: bridge

volumes:
  postgres_data:
    name: restaurant-modern-steak_postgres_data
    external: true
