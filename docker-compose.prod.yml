version: '3.8'

services:
  # 0. CLEANUP SERVICE (runs once before other services)
  # Removes any old containers with hardcoded names from previous deployments
  # to prevent "container name already in use" conflicts on Dokploy re-deploy.
  cleanup:
    image: docker:cli
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Pre-deploy cleanup (containers only, volumes are NEVER touched) ==="
        FOUND=0
        for name in steak-kenangan-db steak-kenangan-backend steak-kenangan-frontend steak-kenangan-tunnel; do
          if docker inspect "$$name" > /dev/null 2>&1; then
            echo "Removing old container: $$name"
            docker stop "$$name" 2>/dev/null || true
            docker rm -f "$$name" 2>/dev/null || true
            FOUND=$$((FOUND+1))
          fi
        done
        if [ "$$FOUND" -eq 0 ]; then
          echo "No old containers found - clean state"
        else
          echo "Removed $$FOUND old container(s)"
        fi
        echo "=== Cleanup complete (database volumes preserved) ==="
    networks:
      - steak-network

  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    restart: always
    depends_on:
      cleanup:
        condition: service_completed_successfully
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      steak-network:
        aliases:
          - db

  # 2. BACKEND SERVICE (Go/Gin)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      cleanup:
        condition: service_completed_successfully
      db:
        condition: service_started
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
    networks:
      steak-network:
        aliases:
          - backend

  # 3. FRONTEND SERVICE (Nginx + Vite Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./docker/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      steak-network:
        aliases:
          - frontend

  # 4. CLOUDFLARE TUNNEL SERVICE
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
    networks:
      - steak-network

networks:
  steak-network:
    driver: bridge

volumes:
  postgres_data:
