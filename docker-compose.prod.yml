version: '3.8'

services:
  # 1. DATABASE SERVICE
  db:
    image: postgres:15-alpine
    container_name: steak-kenangan-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      steak-network:
        aliases:
          - db

  # 2. BACKEND SERVICE (Go/Gin)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: steak-kenangan-backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
    networks:
      steak-network:
        aliases:
          - backend

  # 3. FRONTEND SERVICE (Nginx + Vite Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: steak-kenangan-frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - ./docker/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      steak-network:
        aliases:
          - frontend
      # Port 80 tidak perlu di-expose ke publik jika pakai Tunnel,
      # tapi biarkan di sini jika Anda masih ingin akses via IP Lokal/VPN.
      # ports:
      # - "80:80"

      # 4. CLOUDFLARE TUNNEL SERVICE
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: steak-kenangan-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - steak-network

networks:
  steak-network:
    driver: bridge

volumes:
  postgres_data:
